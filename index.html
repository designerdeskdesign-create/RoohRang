<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoohRang | The Future of Ethnic Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&family=Mrs+Saint+Delafield&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fdfbf7; overflow-x: hidden; }
        .font-serif { font-family: 'Playfair Display', serif; }
        
        /* The Rose Gold Signature Effect */
        .signature-gold {
            font-family: 'Mrs Saint Delafield', cursive;
            background: linear-gradient(to right, #B76E79 0%, #FFD1DC 50%, #B76E79 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            transform: translateY(5px);
            animation: signatureReveal 2.5s ease-out 1.5s forwards;
        }

        @keyframes signatureReveal {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Lethal Diamond Toggle with Neural Pulse */
        .diamond-portal {
            position: relative;
            width: 70px;
            height: 70px;
            background: #2c3e50;
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 20px rgba(183, 110, 121, 0.4);
        }

        .diamond-portal::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            background: rgba(183, 110, 121, 0.2);
            animation: neuralPulse 2s infinite;
        }

        @keyframes neuralPulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .portal-label {
            position: absolute;
            right: 85px;
            bottom: 22px;
            font-size: 10px;
            letter-spacing: 0.4em;
            color: #8e735b;
            text-transform: uppercase;
            opacity: 0.7;
            white-space: nowrap;
        }

        #chat-window { display: none; transform: translateY(20px); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #chat-window.active { display: flex; transform: translateY(0); }
        .glow-border { border-left: 2px solid #B76E79; }
    </style>
</head>
<body>

    <section class="relative h-screen w-full flex flex-col justify-center items-center text-center px-6">
        <div class="absolute inset-0 bg-gradient-to-tr from-[#f4ece2] to-transparent opacity-60"></div>
        
        <div id="hero-content" class="z-10">
            <h1 class="text-7xl md:text-9xl font-serif text-[#2c3e50] mb-2 italic opacity-0 transition-opacity duration-1000" id="title">RoohRang</h1>
            <div class="signature-gold text-3xl md:text-5xl mb-6">by Kritika</div>
            <p class="text-[10px] md:text-xs font-light text-[#8e735b] tracking-[0.8em] uppercase mb-8" id="subtitle">The Future of Ethnic Intelligence</p>
        </div>

        <div class="fixed bottom-10 right-10 z-50 flex flex-col items-end">
            <div id="chat-window" class="w-85 h-112 bg-white/95 backdrop-blur-xl border border-[#d1bfa7] mb-6 rounded-3xl flex-col shadow-2xl overflow-hidden">
                <div class="p-5 border-b border-[#f4ece2] bg-[#2c3e50] text-white">
                    <p class="text-[10px] tracking-[0.3em] uppercase font-semibold">Global Edge v5.1</p>
                    <p class="text-[9px] opacity-60 uppercase">Lead Concierge • Sovereign Mode</p>
                </div>
                <div id="chat-messages" class="flex-1 p-5 overflow-y-auto text-sm space-y-4 font-light text-[#2c3e50]">
                    <p class="bg-[#f4ece2] p-3 rounded-2xl italic leading-relaxed">"Styling is not a race, it's an inevitability. How may I refine your vision today?"</p>
                </div>
                <div class="p-5 border-t border-[#f4ece2] flex items-center">
                    <input type="text" id="user-input" placeholder="Consult the intelligence..." class="flex-1 text-xs outline-none bg-transparent placeholder:italic text-[#2c3e50]">
                    <button id="send-btn" class="ml-3 text-[#B76E79] hover:text-[#2c3e50] transition-transform hover:scale-125">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                    </button>
                </div>
            </div>

            <div class="relative flex items-center">
                <span class="portal-label">Consult Intelligence</span>
                <div id="chat-toggle" class="diamond-portal hover:scale-110">
                    <div class="w-1.5 h-1.5 bg-green-400 rounded-full animate-pulse shadow-[0_0_10px_#4ade80]"></div>
                </div>
            </div>
        </div>

        <div class="absolute bottom-10 left-10 text-left z-10 hidden md:block">
            <p class="text-[9px] text-[#8e735b] font-mono uppercase opacity-40 tracking-widest">System: Global Edge v5.1 High-Latency Neural Link</p>
        </div>
    </section>

    <script>
        const chatToggle = document.getElementById('chat-toggle');
        const chatWindow = document.getElementById('chat-window');
        const sendBtn = document.getElementById('send-btn');
        const userInput = document.getElementById('user-input');
        const messages = document.getElementById('chat-messages');

        chatToggle.addEventListener('click', () => {
            chatWindow.classList.toggle('active');
            chatWindow.style.display = chatWindow.classList.contains('active') ? 'flex' : 'none';
        });

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            messages.innerHTML += `<div class="flex justify-end"><p class="bg-[#2c3e50] text-white p-3 rounded-2xl text-xs max-w-[80%] shadow-lg"> ${text} </p></div>`;
            userInput.value = '';
            
            const thinking = document.createElement('p');
            thinking.className = 'text-[10px] uppercase tracking-widest text-[#B76E79] animate-pulse mt-2';
            thinking.innerText = 'Analyzing Heritage...';
            messages.appendChild(thinking);
            messages.scrollTop = messages.scrollHeight;

            try {
                const response = await fetch('https://hook.us2.make.com/w64o7474wvl6zr5eyoqr191og4s5r0ll', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                const data = await response.text();
                thinking.remove();
                messages.innerHTML += `<div class="glow-border bg-[#f4ece2]/50 p-4 rounded-2xl text-xs leading-relaxed shadow-sm">${data}</div>`;
            } catch (error) {
                thinking.innerText = 'Link unstable. Retrying connection...';
            }
            messages.scrollTop = messages.scrollHeight;
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('title').style.opacity = '1';
            }, 300);
        });
    </script>
</body>
</html>
